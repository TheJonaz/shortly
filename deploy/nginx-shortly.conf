# nginx snippet for serving the shortly app at /shortly on the host.
#
# 1. Edit `root` below: it should point at the PARENT directory that
#    contains the `shortly/` checkout (so /shortly resolves to it).
#    Example: if the repo is at /home/me/code/shortly,
#    set root /home/me/code;
# 2. Paste inside the existing server { ... } block.
# 3. sudo nginx -t && sudo systemctl reload nginx

location ^~ /shortly {
    root /path/to/parent-of-shortly;  # ← edit this to the directory above shortly/
    index index.php;

    # Defense in depth: block server-side files. ^~ on /data/ uses prefix
    # match (beats the regex blocks below) and covers the whole directory —
    # a regex on .db only would expose any other file that lands there
    # (logs, dumps, backups). nginx ignores .htaccess so this is the only
    # gate on a Linux+nginx deploy.
    location ^~ /shortly/data/                          { deny all; return 404; }
    location ^~ /shortly/deploy/                        { deny all; return 404; }
    location = /shortly/deploy.sh                       { deny all; return 404; }
    location = /shortly/config.php                      { deny all; return 404; }
    location = /shortly/config.example.php              { deny all; return 404; }
    location ~ ^/shortly/(lib|views)(/|$)               { deny all; return 404; }
    location ~ ^/shortly/.*/\.(htaccess|ftp-password)$  { deny all; return 404; }
    # Allow .well-known/ for ACME / domain-verification — must come before
    # the catch-all dot-block below or all /.well-known/ paths get blocked.
    location ^~ /shortly/.well-known/                   { try_files $uri =404; }
    location ~ ^/shortly/\.                              { deny all; return 404; }

    # Real files served directly; everything else → front controller.
    try_files $uri $uri/ @shortly;

    # PHP execution.
    location ~ \.php$ {
        # Refuse to fastcgi_pass anything that isn't a real .php file —
        # without this, a URL like /uploads/evil.jpg.php/x can reach
        # PHP-FPM via fastcgi_split_path_info. shortly has no uploads
        # today but the cost is zero and the failure mode is severe.
        try_files                  $fastcgi_script_name =404;
        fastcgi_pass               unix:/run/php/php8.3-fpm.sock;
        fastcgi_split_path_info    ^(.+\.php)(/.*)$;
        include                    fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        fastcgi_read_timeout       60s;
    }
}

location @shortly {
    rewrite ^/shortly(/.*)?$ /shortly/index.php?$is_args$args last;
}
